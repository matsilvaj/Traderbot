services:
  traderbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traderbot
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      TRADERBOT_NETWORK: ${TRADERBOT_NETWORK:-mainnet}
      TRADERBOT_EXECUTION_MODE: ${TRADERBOT_EXECUTION_MODE:-exchange}
      TRADERBOT_ALLOW_LIVE_TRADING: ${TRADERBOT_ALLOW_LIVE_TRADING:-true}
    volumes:
      - .:/app
    working_dir: /app
    command: python telegram_panel.py
    restart: unless-stopped

  traderbot-runtime:
    profiles:
      - runtime
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traderbot-runtime
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      TRADERBOT_NETWORK: ${TRADERBOT_NETWORK:-mainnet}
      TRADERBOT_EXECUTION_MODE: ${TRADERBOT_EXECUTION_MODE:-exchange}
      TRADERBOT_ALLOW_LIVE_TRADING: ${TRADERBOT_ALLOW_LIVE_TRADING:-true}
    volumes:
      - .:/app
    working_dir: /app
    command: python -u -m traderbot.headless_entry
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: traderbot-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
