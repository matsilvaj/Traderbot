app_name: traderbot-rl
paths:
  models_dir: models
  results_dir: results
  logs_dir: logs
hyperliquid:
  enabled: true
  wallet_address: null
  private_key: null
  network: testnet
  symbol: BTC
  timeframe: 1h
  history_bars: 10000
  live_window_bars: 2000
data:
  source: csv
  csv_path: data/binance_btcusdt_h1.csv
  timestamp_column: timestamp
features:
  rsi_period: 14
  ma_short_period: 9
  ma_long_period: 21
  momentum_period: 3
  normalize: true
environment:
  initial_balance: 250.0
  simulation_initial_balance: 250.0
  max_risk_per_trade: 0.01
  action_hold_threshold: 0.65
  regime_min_abs_dist_ema_240: 0.025
  regime_min_vol_regime_z: 0.3
  taker_fee_pct: 0.00045
  slippage_pct: 0.0001
  stop_loss_pct: 0.02
  take_profit_pct: 0.05
  force_exit_only_by_tp_sl: true
  reward_clip_limit: 5.0
  pain_decay_factor: 0.0
  overtrade_penalty: 0.0
  blocked_trade_penalty: 0.0
  close_profit_bonus: 0.0
  close_loss_penalty: 0.0
  broker_min_notional_usd: 10.0
  use_broker_constraints: true
  broker_volume_min: 0.0001
  broker_volume_step: 0.0001
  broker_volume_max: 22.0
  broker_contract_size: 1.0
  broker_point: 1.0
  block_trade_on_excess_risk: false
  max_episode_steps: null
  trade_cooldown_steps: 1
  margin_call_drawdown_pct: 0.8
  margin_call_penalty: 10.0
ablation:
  enabled: false
  pain_decay_factors:
  - 0.0
  - 0.001
  - 0.002
training:
  total_timesteps: 10000000
  learning_rate: 0.0003
  n_steps: 8192
  batch_size: 1024
  gamma: 0.995
  gae_lambda: 0.95
  ent_coef: 0.01
  clip_range: 0.2
  policy: MlpPolicy
  device: cpu
  num_envs: 6
  episode_steps: 10000
  model_name: ppo_btc_h1
  train_split: 0.7
  seed: null
  log_interval_steps: 5000
  log_trade_events: false
  acceptance_min_total_profit: 2.0
  max_drawdown_limit: 0.4
  acceptance_min_profit_per_trade: 0.0001
  acceptance_min_pass_rate: 0.4
execution:
  execution_mode: exchange
  decision_mode: ensemble_majority_vote
  order_slippage: 0.05
  defensive_drawdown_pct: 0.02
  defensive_risk_multiplier: 0.5
  validation_balance: 250.0
  ensemble_enabled: true
  backtest_ensemble_only: false
  selected_model_names:
  - ppo_btc_h1_s1
  - ppo_btc_h1_s21
  - ppo_btc_h1_s256
  - ppo_btc_h1_s512
  - ppo_btc_h1_s999
  allow_live_trading: true
  min_seconds_between_orders: 10
  api_retry_attempts: 2
  api_retry_delay_seconds: 3
  pause_on_error_seconds: 60
launcher:
  auto_check_interval_seconds: 90
  notification_limit: 80
  openai_enabled: true
  openai_model: gpt-4o-mini
  openai_timeout_seconds: 12
  openai_api_key_env: OPENAI_API_KEY
retraining:
  enabled: false
  interval_minutes: 60
